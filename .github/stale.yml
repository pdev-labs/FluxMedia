# Configuration for probot-stale - https://github.com/probot/stale

# Number of days of inactivity before an Issue or Pull Request becomes stale
daysUntilStale: 60

# Number of days of inactivity before an Issue or Pull Request with the stale label is closed.
# Set to false to disable. If disabled, issues still get the stale label but are never closed.
daysUntilClose: 7

# Issues or Pull Requests with these labels will never be marked stale. Set to `[]` to disable
exemptLabels:
  - "pinned"
  - "security"
  - "help wanted"
  - "to-triage"

# Label to use when marking an Issue or Pull Request as stale
staleLabel: stale

# Comment to post when marking an Issue as stale. Set to `false` to disable
markComment: >
  This issue has been automatically marked as stale because it has not had
  recent activity. It will be closed if no further activity occurs. Thank you
  for your contributions.

# Comment to post when marking a Pull Request as stale. Set to `false` to disable
prComment: >
  This pull request has been automatically marked as stale because it has not had
  recent activity. It will be closed if no further activity occurs. Thank you
  for your contributions.

# Comment to post when closing a stale Issue or Pull Request. Set to `false` to disable
closeComment: >
  This issue/PR was closed because it has been inactive for 7 days since being marked as stale.
