name: Publish Python 🐍 distribution 📦 to PyPI

on:
  release:
    types: [published]
  # Alternatively, you can uncomment the lines below to run it manually from the Actions tab:
  workflow_dispatch:

jobs:
  build-and-publish:
    name: Build and publish Python distribution 📦
    runs-on: ubuntu-latest
    environment:
      name: pypi

    # This permission is required for Trusted Publishing (OIDC) to PyPI
    permissions:
      id-token: write
      contents: read

    steps:
    - uses: actions/checkout@v7

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.x"

    - name: Install build tools
      run: |
        python -m pip install --upgrade pip
        pip install build twine

    - name: Build distribution
      run: python -m build

    - name: Publish distribution 📦 to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      # Note: To use this, you must configure Trusted Publishing on PyPI.
      # Go to your PyPI project settings -> Publishing -> Add a new publisher (GitHub)
